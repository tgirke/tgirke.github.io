project:
  type: website
  output-dir: docs
  resources:
    - CNAME
  render:
    - "*.qmd"
    - "*.md"

website:
  title: "Girke Lab"
  description: "Research and Teaching — University of California, Riverside"
  site-url: "https://girke.bioinformatics.ucr.edu/"
  repo-url: "https://github.com/tgirke/tgirke.github.io"
  repo-actions: [edit, issue]
  favicon: assets/favicon.ico
  open-graph: true
  twitter-card: true

  navbar:
    logo: assets/logo.png
    logo-alt: "Girke Lab"
    title: false
    pinned: true
    background: light
    foreground: dark
    left:
      - text: "About"
        href: about/about.qmd
      - text: "People"
        menu:
          - text: "Members"
            href: people/members.qmd
          - text: "Thomas Girke"
            href: people/thomas_girke.qmd
          - text: "Contact"
            href: people/contact.qmd
      - text: "Research"
        menu:
          - text: "Projects"
            href: research/projects/projects.qmd
          - text: "Publications"
            href: research/publications/publications.qmd
          - text: "Software"
            href: research/software/software.qmd
          - text: "Funding"
            href: research/funding/funding.qmd
      - text: "Teaching"
        href: teaching/teaching.qmd
      - text: "Positions"
        href: positions/positions.qmd
      - text: "Links"
        menu:
          - text: "Public Sites"
            href: links/public.qmd
          - text: "UCR Sites"
            href: links/ucr.qmd
    right:
      - icon: github
        href: https://github.com/tgirke/tgirke.github.io
        aria-label: GitHub

  sidebar:
    - id: research
      title: "Research"
      style: "floating"
      search: false
      collapse-level: 1
      contents:
        - research/projects/projects.qmd
        - research/publications/publications.qmd
        - research/software/software.qmd
        - research/funding/funding.qmd

    - id: links
      title: "Links"
      style: "floating"
      search: false
      collapse-level: 1
      contents:
        - links/public.qmd
        - links/ucr.qmd

    - id: people
      title: "People"
      style: "floating"
      search: false
      collapse-level: 1
      contents:
        - people/members.qmd
        - people/thomas_girke.qmd
        - people/contact.qmd

  search:
    location: navbar
    type: overlay

  page-footer:
    left: "© 2026 Thomas Girke, UC Riverside"
    right:
      - text: "Girke Lab on GitHub"
        href: https://github.com/tgirke/tgirke.github.io

  page-navigation: true
  back-to-top-navigation: true

format:
  html:
    theme:
      light: [cosmo, assets/custom.scss]
      dark: [darkly, assets/custom-dark.scss]
    include-in-header:
      text: |
        <meta name="google-site-verification" content="wv8Ml0hz_fMa6wysPlBI4tWyZb4s_43ZBsufyNe8dC0">
    toc: true
    toc-location: right
    toc-depth: 2
    toc-title: "On this page"
    number-sections: false
    code-fold: false
    code-tools: false
    code-link: true
    highlight-style: github
    df-print: paged
    fig-align: center
    fig-responsive: true
    smooth-scroll: true
    link-external-icon: true
    link-external-newwindow: true

execute:
  freeze: auto
  cache: true
  warning: false
  message: false
